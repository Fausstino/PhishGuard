<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>PhishGuard</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      width: 340px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #080d17;
      color: #e2e8f0;
    }

    .header {
      display:flex; align-items:center; gap:10px;
      padding:14px 16px;
      border-bottom:1px solid #1e293b;
    }
    .logo {
      width:30px; height:30px; border-radius:8px; flex-shrink:0;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      display:flex; align-items:center; justify-content:center; font-size:15px;
    }
    .logo-text h1 { font-size:14px; font-weight:700; }
    .logo-text p  { font-size:11px; color:#64748b; margin-top:1px; }
    .badge {
      margin-left:auto;
      background:rgba(99,102,241,0.1);
      border:1px solid rgba(99,102,241,0.2);
      color:#818cf8; font-size:10px;
      padding:3px 8px; border-radius:100px;
    }

    .url-bar {
      margin:10px 14px 0;
      padding:7px 10px;
      background:#0f1a2e; border:1px solid #1e293b; border-radius:7px;
      font-size:11px; color:#64748b;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .card {
      margin:10px 14px;
      border-radius:12px; padding:14px;
    }
    .card.safe       { background:#052e16; border:1px solid #166534; }
    .card.suspicious { background:#1c1400; border:1px solid #92400e; }
    .card.phishing   { background:#1a0505; border:1px solid #991b1b; }
    .card.loading    { background:#0f172a; border:1px solid #1e293b; }

    .card-top { display:flex; align-items:center; gap:10px; }
    .card-icon { font-size:26px; line-height:1; }
    .card-label { font-size:15px; font-weight:700; }
    .safe       .card-label { color:#4ade80; }
    .suspicious .card-label { color:#fbbf24; }
    .phishing   .card-label { color:#f87171; }
    .loading    .card-label { color:#94a3b8; }
    .card-sub { font-size:11px; color:#64748b; margin-top:2px; }

    /* Шкала риска */
    .risk-bar-wrap { margin-top:12px; }
    .risk-label { display:flex; justify-content:space-between; font-size:11px; color:#64748b; margin-bottom:5px; }
    .risk-bar-bg { height:6px; background:#1e293b; border-radius:100px; overflow:hidden; }
    .risk-bar-fill { height:100%; border-radius:100px; transition:width 0.4s; }
    .safe       .risk-bar-fill { background:#22c55e; }
    .suspicious .risk-bar-fill { background:#f59e0b; }
    .phishing   .risk-bar-fill { background:#ef4444; }

    .signs { margin-top:12px; display:flex; flex-direction:column; gap:5px; }
    .sign {
      display:flex; align-items:flex-start; gap:7px;
      font-size:12px; color:#94a3b8; line-height:1.5;
    }
    .sign::before { content:"•"; color:#475569; flex-shrink:0; margin-top:1px; }

    .spinner {
      width:16px; height:16px; flex-shrink:0;
      border:2px solid #1e293b; border-top-color:#6366f1;
      border-radius:50%; animation:spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .footer-note {
      text-align:center; font-size:10px; color:#334155;
      padding:0 14px 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🛡</div>
    <div class="logo-text">
      <h1>PhishGuard</h1>
      <p>Защита от фишинга</p>
    </div>
    <div class="badge">офлайн</div>
  </div>

  <div class="url-bar" id="urlBar">—</div>

  <div class="card loading" id="card">
    <div class="card-top">
      <div class="spinner"></div>
      <div>
        <div class="card-label">Проверяем...</div>
        <div class="card-sub">Анализируем страницу</div>
      </div>
    </div>
  </div>

  <div class="footer-note">Работает на правилах · Без отправки данных</div>

  <script src="popup.js"></script>
</body>
</html>
